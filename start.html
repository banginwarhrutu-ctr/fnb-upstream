<header class="hero page-hero wash-mint">
  <div class="wrap">
    <div class="mix-dots"><span></span><span></span><span></span><span></span></div>
    <div class="hero-kicker">The brief</div>
    <h1>Tell us what you're building.</h1>
  </div>
</header>


<section class="section" style="padding-top: 20px;">
  <div class="wrap">
    <div class="form-card">
      <form id="intake-form" onsubmit="handleIntake(event, this)" novalidate>
        <div class="field">
          <label for="if-name">Your name</label>
          <input class="input-field" id="if-name" name="name" type="text" placeholder="Full name">
          <div class="field-error" data-error="name"></div>
        </div>
        <div class="field">
          <label for="if-company">Brand / company</label>
          <input class="input-field" id="if-company" name="company" type="text" placeholder="Or working title — 'exploring' is fine">
          <div class="field-error" data-error="company"></div>
        </div>
        <div class="field">
          <label for="if-linkedin">LinkedIn</label>
          <input class="input-field" id="if-linkedin" name="linkedin" type="url" placeholder="linkedin.com/in/you">
          <div class="field-error" data-error="linkedin"></div>
        </div>
        <div class="field">
          <label for="if-contact">WhatsApp number</label>
          <input class="input-field" id="if-contact" name="contact" type="tel" placeholder="10-digit number">
          <div class="field-error" data-error="contact"></div>
        </div>
        <div class="field">
          <label for="if-category">What are you building?</label>
          <input class="input-field" id="if-category" name="category" type="text" placeholder="e.g. protein khakhra, functional beverage, millet snack">
        </div>
        <div class="field">
          <label for="if-stage">Where are you in development?</label>
          <select id="if-stage" name="stage">
            <option value="">Select your stage</option>
            <option>Idea — nothing made yet</option>
            <option>Recipe works in my kitchen</option>
            <option>Formulation in progress with a consultant</option>
            <option>Formula done — need a manufacturer</option>
            <option>Manufacturing sorted — need testing / compliance</option>
            <option>Already launched — fixing my supply chain</option>
          </select>
        </div>
        <div class="field">
          <label for="if-stuck">What are you stuck on?</label>
          <textarea id="if-stuck" name="stuck" rows="4" placeholder="Be specific. 'CM ghosted me after quoting 10,000 unit MOQ' is more useful than 'manufacturing'."></textarea>
        </div>
      <div class="hp-wrap" aria-hidden="true"><label for="if-website">Website</label><input id="if-website" name="website" type="text" tabindex="-1" autocomplete="off"></div>
        <button type="submit" class="btn btn-primary btn-submit">Send the brief</button>
      </form>
    </div>
  </div>
</section>

        <a href="index.html" class="logo">First Batch Co</a>

        <div class="footer-social">
